<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic-Tac-Toe</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --x-color: #4cc9f0;
            --o-color: #f72585;
            --grid-gap: 10px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* --- Setup Screen --- */
        .setup-container {
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            transition: all 0.3s ease;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
            width: 200px;
            background: #0f3460;
            color: white;
            font-size: 1rem;
            border: 2px solid transparent;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--text-color);
        }

        button.start-btn {
            background-color: var(--text-color);
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button.start-btn:hover {
            transform: scale(1.05);
            background-color: #c0354a;
        }

        /* --- Game Board Area (Hidden initially) --- */
        .game-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .scoreboard {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            background: var(--container-bg);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .player-score {
            text-align: center;
            position: relative;
        }

        .player-score.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--text-color);
            animation: slideIn 0.3s ease-out;
        }

        .score-val {
            font-size: 2rem;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--grid-gap);
            margin-bottom: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: var(--container-bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
        }

        .cell:hover {
            background-color: #1f2e52;
        }

        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }
        
        /* Winning animation */
        .cell.winner {
            background-color: rgba(76, 201, 240, 0.2);
            animation: pulse 1s infinite;
        }
        .cell.winner.o {
            background-color: rgba(247, 37, 133, 0.2);
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            height: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .game-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .reset-btn { background-color: var(--x-color); color: #1a1a2e; }
        .new-game-btn { background-color: var(--text-color); color: white; }
        .game-btn:hover { opacity: 0.9; }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .cell span {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

    </style>
</head>
<body>

    <h1>Tic-Tac-Toe 
        by Prathik.
    </h1>

    <div class="setup-container" id="setupScreen">
        <h2>Enter Player Names</h2>
        <div class="input-group">
            <input type="text" id="playerXName" placeholder="Player 1 (X)" value="Player 1">
        </div>
        <div class="input-group">
            <input type="text" id="playerOName" placeholder="Player 2 (O)" value="Player 2">
        </div>
        <button class="start-btn" onclick="startGame()">Start Game</button>
    </div>

    <div class="game-container" id="gameScreen">
        <div class="scoreboard">
            <div class="player-score active" id="scoreBoxX">
                <div id="pXNameDisplay">Player 1 (X)</div>
                <div class="score-val" id="scoreX">0</div>
            </div>
            <div class="player-score" id="scoreBoxO">
                <div id="pONameDisplay">Player 2 (O)</div>
                <div class="score-val" id="scoreO">0</div>
            </div>
        </div>

        <div class="status" id="statusText">It's X's turn</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button class="game-btn reset-btn" onclick="resetBoard()">Reset Board</button>
            <button class="game-btn new-game-btn" onclick="newGame()">Change Players</button>
        </div>
    </div>

    <script>
        // State variables
        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        let scores = { X: 0, O: 0 };
        let playerNames = { X: "Player 1", O: "Player 2" };

        // DOM Elements
        const setupScreen = document.getElementById('setupScreen');
        const gameScreen = document.getElementById('gameScreen');
        const statusText = document.getElementById('statusText');
        const cells = document.querySelectorAll('.cell');
        const scoreBoxX = document.getElementById('scoreBoxX');
        const scoreBoxO = document.getElementById('scoreBoxO');

        // Winning combinations
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function startGame() {
            const p1 = document.getElementById('playerXName').value.trim();
            const p2 = document.getElementById('playerOName').value.trim();
            
            playerNames.X = p1 || "Player 1";
            playerNames.O = p2 || "Player 2";

            document.getElementById('pXNameDisplay').innerText = `${playerNames.X} (X)`;
            document.getElementById('pONameDisplay').innerText = `${playerNames.O} (O)`;

            setupScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            resetBoard();
        }

        function handleCellClick(clickedCellEvent) {
            const clickedCell = clickedCellEvent.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "" || !gameActive) {
                return;
            }

            handleCellPlayed(clickedCell, clickedCellIndex);
            handleResultValidation();
        }

        function handleCellPlayed(clickedCell, clickedCellIndex) {
            gameState[clickedCellIndex] = currentPlayer;
            // Add span for animation effect
            clickedCell.innerHTML = `<span>${currentPlayer}</span>`;
            clickedCell.classList.add(currentPlayer.toLowerCase());
        }

        function handleResultValidation() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];

                if (a === '' || b === '' || c === '') {
                    continue;
                }
                if (a === b && b === c) {
                    roundWon = true;
                    winningLine = winCondition;
                    break;
                }
            }

            if (roundWon) {
                statusText.innerText = `🎉 ${playerNames[currentPlayer]} Wins!`;
                gameActive = false;
                updateScore(currentPlayer);
                highlightWinner(winningLine);
                return;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusText.innerText = "Game ended in a Draw!";
                gameActive = false;
                return;
            }

            handlePlayerChange();
        }

        function handlePlayerChange() {
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = `It's ${playerNames[currentPlayer]}'s turn`;
            
            // Toggle active class for visual indicator
            if(currentPlayer === 'X') {
                scoreBoxX.classList.add('active');
                scoreBoxO.classList.remove('active');
            } else {
                scoreBoxO.classList.add('active');
                scoreBoxX.classList.remove('active');
            }
        }

        function updateScore(winner) {
            scores[winner]++;
            document.getElementById(`score${winner}`).innerText = scores[winner];
        }

        function highlightWinner(indices) {
            indices.forEach(index => {
                cells[index].classList.add('winner');
            });
        }

        function resetBoard() {
            gameActive = true;
            currentPlayer = "X";
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusText.innerText = `It's ${playerNames.X}'s turn`;
            
            // Reset visuals
            scoreBoxX.classList.add('active');
            scoreBoxO.classList.remove('active');
            
            cells.forEach(cell => {
                cell.innerHTML = "";
                cell.classList.remove('x', 'o', 'winner');
            });
        }

        function newGame() {
            scores = { X: 0, O: 0 };
            document.getElementById('scoreX').innerText = "0";
            document.getElementById('scoreO').innerText = "0";
            gameScreen.style.display = 'none';
            setupScreen.style.display = 'block';
            resetBoard();
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    </script>
</body>
</html>
