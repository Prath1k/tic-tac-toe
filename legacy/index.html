<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Tic-Tac-Toe <span>by Prathik</span></h1>

    <!-- ====== SETUP SCREEN ====== -->
    <div class="setup-container" id="setupScreen">
        <h2>Game Setup</h2>

        <div class="mode-selector">
            <button class="mode-btn active" id="modePlayer" onclick="setMode('player')">👥 vs Player</button>
            <button class="mode-btn" id="modeAI" onclick="setMode('ai')">🤖 vs AI</button>
            <button class="mode-btn" id="modeOnline" onclick="setMode('online')">🌐 Online</button>
        </div>

        <div class="online-lobby" id="onlineLobby">
            <div class="lobby-options">
                <button class="lobby-btn active" id="lobbyCreate" onclick="setLobbyTab('create')">Create Room</button>
                <button class="lobby-btn" id="lobbyJoin" onclick="setLobbyTab('join')">Join Room</button>
            </div>
            <div id="createPanel">
                <div class="room-code-display" id="roomCodeBox">
                    <div class="label">Your Room Code</div>
                    <div class="code" id="roomCodeText">----</div>
                    <button class="copy-btn" id="copyBtn" onclick="copyRoomCode()">Copy</button>
                </div>
                <div class="conn-status waiting" id="createStatus">
                    <span class="dot"></span> Generating code...
                </div>
            </div>
            <div id="joinPanel" style="display:none">
                <div class="join-input">
                    <input type="text" id="joinCodeInput" maxlength="4" placeholder="0000" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    <button id="joinBtn" onclick="joinRoom()">Connect</button>
                </div>
                <div class="conn-status" id="joinStatus" style="display:none">
                    <span class="dot"></span> <span class="text">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="difficulty-selector" id="difficultySelector">
            <label>AI Difficulty</label>
            <div class="diff-buttons">
                <button class="diff-btn active" onclick="setDifficulty('easy', this)">Easy</button>
                <button class="diff-btn" onclick="setDifficulty('medium', this)">Medium</button>
                <button class="diff-btn" onclick="setDifficulty('hard', this)">Hard</button>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="playerXName" placeholder="Your Name (X)" value="Player 1">
        </div>
        <div class="input-group" id="player2Group">
            <input type="text" id="playerOName" placeholder="Player 2 (O)" value="Player 2">
        </div>

        <div class="timer-toggle">
            <span>⏱ Move Timer (15s)</span>
            <label class="toggle-switch">
                <input type="checkbox" id="timerToggle">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <button class="start-btn" onclick="startGame()">Start Game</button>
    </div>

    <!-- ====== GAME SCREEN ====== -->
    <div class="game-container" id="gameScreen">
        <div class="round-info">
            <span class="round-badge" id="roundBadge">Round 1</span>
            <span class="online-badge" id="onlineBadge">🌐 ONLINE</span>
            <span class="streak-badge" id="streakBadge">🔥 0</span>
        </div>

        <div class="scoreboard">
            <div class="player-score active-x" id="scoreBoxX">
                <div class="name" id="pXNameDisplay">Player 1 (X)</div>
                <div class="score-val" id="scoreX">0</div>
            </div>
            <div class="player-score" id="scoreBoxO">
                <div class="name" id="pONameDisplay">Player 2 (O)</div>
                <div class="score-val" id="scoreO">0</div>
            </div>
        </div>

        <div class="timer-bar-container" id="timerBarContainer">
            <div class="timer-bar" id="timerBar"></div>
        </div>

        <div class="status" id="statusText">It's X's turn</div>
        <div class="ai-thinking" id="aiThinking">
            🤖 AI is thinking
            <div class="thinking-dots"><span></span><span></span><span></span></div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button class="game-btn undo-btn" id="undoBtn" onclick="undoMove()" disabled>↩ Undo</button>
            <button class="game-btn reset-btn" onclick="resetBoard()">🔄 Reset</button>
            <button class="game-btn new-game-btn" onclick="newGame()">⚙ Menu</button>
        </div>
    </div>

    <div class="disconnect-overlay" id="disconnectOverlay">
        <div class="msg">😔 Opponent Disconnected</div>
        <div class="sub">The other player has left the game.</div>
        <button onclick="closeDisconnectOverlay()">Back to Menu</button>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/confetti.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
    <script src="js/multiplayer.js"></script>
</body>
</html>
